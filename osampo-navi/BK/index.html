    <style>
        /* --- CSS: スマホに最適化したパステル調スタイル --- */
        :root {
            --primary-pink: #ff7eb3;
            --soft-blue: #6a82fb;
            --bg-color: #fff5f5;
            --card-bg: #ffffff;
            --text-dark: #5a5a5a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden;
        }

        #app-container {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }

        /* 上部検索＆フィルターエリア */
        #controls {
            background: var(--card-bg);
            padding: 12px;
            box-shadow: 0 2px 10px rgba(255, 182, 193, 0.3);
            z-index: 1000;
        }

        .search-box {
            display: flex; gap: 8px; margin-bottom: 10px;
        }

        #addressInput {
            flex-grow: 1; padding: 10px; border: 2px solid #ffe0e6;
            border-radius: 20px; font-size: 0.95rem; outline: none;
        }

        #searchBtn {
            background: var(--primary-pink); color: white; border: none;
            padding: 0 15px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        .buttons {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .buttons button {
            flex-shrink: 0; background: #fff0f5; border: 1px solid #ffe0e6;
            padding: 8px 14px; border-radius: 15px; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        .buttons button.active {
            background: var(--primary-pink); color: white; border-color: var(--primary-pink);
        }

        /* 地図エリア */
        #map {
            flex-grow: 1; width: 100%; z-index: 1;
        }

        /* スマホ用詳細ボトムシート */
        #detail-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg); border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s ease-out;
            z-index: 1001; padding: 20px; max-height: 60%; overflow-y: auto;
        }

        #detail-sheet.open { transform: translateY(0); }
        .sheet-close { float: right; font-size: 1.5rem; color: #ccc; cursor: pointer; }
        .spot-title { font-size: 1.25rem; color: var(--primary-pink); margin: 0 0 8px 0; font-weight: bold; }
        .distance-tag { display: inline-block; background: var(--soft-blue); color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 12px; }
        .info-p { margin: 6px 0; font-size: 0.9rem; line-height: 1.4; }
        
        /* 設備情報の強調テキスト枠 */
        .amenities-box {
            background: #fff0f5; border-left: 4px solid var(--primary-pink);
            padding: 10px; border-radius: 4px; margin-top: 12px; font-size: 0.88rem;
        }
    </style>
</head>

      { "name": "道の駅みさわ 斗南藩記念観光村", "category": "roadside_station", "lat": 40.7355, "lng": 141.3685, "amenities": "ポニー乗馬やゴーカート。授乳室・おむつ台完備で長距離ドライブの休憩に最適", "hours": "9:00-19:00", "holidays": "年末年始" }
    ];

    // 3. マップ初期化（八戸を初期のカメラ中心にします）
    const map = L.map('map').setView([40.5126, 141.4901], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let markerLayer = L.layerGroup().addTo(map);
    let myLocationMarker = null;
    let userLocation = null;
    let currentCategoryFilter = 'all';

    // 4. 自動追尾機能（パパママの現在地をリアルタイムに監視）
    function startTracking() {
        if (!navigator.geolocation) return;

        navigator.geolocation.watchPosition(position => {
            const { latitude, longitude } = position.coords;
            userLocation = { lat: latitude, lng: longitude };
            
            // 現在地ピン（🏃‍♂️）の更新
            if (myLocationMarker) map.removeLayer(myLocationMarker);
            myLocationMarker = L.marker([latitude, longitude], {
                icon: createCustomIcon('🏃‍♂️')
            }).addTo(map);
            
            // 現在地が変わるたびに表示距離を再計算してピンを再描画
            filterMarkers(currentCategoryFilter);
        }, null, { enableHighAccuracy: true });
    }

    // 5. 距離計算関数（ハバサイン公式）
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // 地球の半径(km)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return d < 1 ? `${Math.round(d * 1000)}m` : `${d.toFixed(1)}km`;
    }

    // 6. フィルター切り替えロジック
    function filterMarkers(category) {
        currentCategoryFilter = category;
        
        // 選択されたボタンをピンク（Active）にする
        document.querySelectorAll('.buttons button').forEach(btn => btn.classList.remove('active'));
        const targetBtn = document.getElementById(`btn-${category}`);
        if (targetBtn) targetBtn.classList.add('active');

        // 古いピンを一度全削除
        markerLayer.clearLayers();

        // 今回のご提示データをもとにピンを配置
        locations.forEach(spot => {
            if (category === 'all' || spot.category === category) {
                
                // 【初期ルール】基本カテゴリの絵文字をセット
                let emoji = iconTemplates[spot.category] || iconTemplates.default;

                // 【ユーザー様の自動上書きルール】名前に公園や広場が含まれる場合は自動で滑り台（🛝）にする
                if (
                    spot.name.includes("公園") || 
                    spot.name.includes("広場") || 
                    spot.name.includes("こども館") ||
                    spot.name.includes("遊び場")
                ) {
                    emoji = iconTemplates.playground; // 🛝に上書き
                }

                // マーカー配置
                const marker = L.marker([spot.lat, spot.lng], { icon: createCustomIcon(emoji) });
                marker.on('click', () => showDetail(spot));
                markerLayer.addLayer(marker);
            }
        });
    }

    // 7. 詳細ウィンドウ（ボトムシート）の中身の生成とアニメーション
    function showDetail(spot) {
        const sheet = document.getElementById('detail-sheet');
        const content = document.getElementById('sheet-content');
        
        let distText = "現在地を取得中...";
        if (userLocation) {
            distText = `現在地から ${getDistance(userLocation.lat, userLocation.lng, spot.lat, spot.lng)}`;
        }

        content.innerHTML = `
            <div class="spot-title">${spot.name}</div>
            <span class="distance-tag"><i class="fa-solid fa-location-arrow"></i> ${distText}</span>
            <p class="info-p"><strong>⏰ 営業時間:</strong> ${spot.hours}</p>
            <p class="info-p"><strong>📅 休館日:</strong> ${spot.holidays}</p>
            <div class="amenities-box">
                <strong>🍀 設備・特徴情報:</strong><br>
                ${spot.amenities}
            </div>
        `;
        sheet.classList.add('open');
    }

    function closeSheet() {
        document.getElementById('detail-sheet').classList.remove('open');
    }

    // 8. 施設名や設備内容からヒットさせるキーワード複合検索
    function searchAddress() {
        const query = document.getElementById('addressInput').value.trim().toLowerCase();
        if (!query) return;

        // 名前、または設備情報（amenities）に文字が含まれるものを探す
        const found = locations.find(spot => 
            spot.name.toLowerCase().includes(query) || 
            spot.amenities.toLowerCase().includes(query)
        );

        if (found) {
            map.setView([found.lat, found.lng], 14);
            showDetail(found);
        } else {
            alert("該当する子育てスポットが見つかりませんでした。別のキーワード（おむつ、授乳室など）もお試しください。");
        }
    }

    // 9. 起動スクリプト
    startTracking();      // GPS監視開始
    filterMarkers('all'); // 初回全表示
</script>
